  <!-- ========== INTER-CELL CONNECTIONS (on top of cells) ========== -->
  <g id="connections">
    <line class="conn-line" x1="370" y1="222" x2="525" y2="288"/>
    <line class="conn-line" x1="875" y1="275" x2="1015" y2="230"/>
    <line class="conn-line" x1="1170" y1="390" x2="1065" y2="515"/>
    <line class="conn-line" x1="935" y1="540" x2="810" y2="445"/>
    <line class="conn-line" x1="495" y1="560" x2="570" y2="430"/>
  </g>

  <!-- Connection labels (pill badges) -->
