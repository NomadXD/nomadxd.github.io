    <g transform="translate(306,663)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#4DB6AC"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#4DB6AC"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#4DB6AC"/>
