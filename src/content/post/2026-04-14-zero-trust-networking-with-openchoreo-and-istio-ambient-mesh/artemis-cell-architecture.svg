    <rect x="418" y="242" width="60" height="18" rx="9" fill="#C8E6C9"/>
    <text class="conn-label" x="448" y="255" fill="#2E7D32">handoff</text>
    <rect x="920" y="235" width="72" height="18" rx="9" fill="#C8E6C9"/>
    <text class="conn-label" x="956" y="248" fill="#2E7D32">commands</text>
    <rect x="1100" y="440" width="66" height="18" rx="9" fill="#C8E6C9"/>
    <text class="conn-label" x="1133" y="453" fill="#2E7D32">telemetry</text>
    <rect x="853" y="498" width="60" height="18" rx="9" fill="#C8E6C9"/>
    <text class="conn-label" x="883" y="511" fill="#2E7D32">relay</text>
    <rect x="493" y="482" width="70" height="18" rx="9" fill="#C8E6C9"/>
    <text class="conn-label" x="528" y="495" fill="#2E7D32">ESM data</text>
  </g>
</svg>
