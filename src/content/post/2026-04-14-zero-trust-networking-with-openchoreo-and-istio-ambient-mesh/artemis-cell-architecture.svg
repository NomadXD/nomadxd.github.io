    <g transform="translate(1124,215)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#FFB74D"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#FFB74D"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#FFB74D"/>
    </g>
    <text class="comp-label" x="1124" y="249">crew-interface</text>

    <!-- Waypoint proxy on left edge -->
    <circle cx="1030" cy="215" r="18" fill="#466BB0" filter="url(#shd)"/>
    <polygon points="1020,215 1027,210 1027,220" fill="#FFFFFF"/>
    <polygon points="1040,215 1033,210 1033,220" fill="#FFFFFF"/>
    <text class="waypoint-label" x="1030" y="241">waypoint</text>

    <text class="cell-title" x="1205" y="418" fill="#E65100">Orion</text>
  </g>

  <!-- ========== ESA OPS CELL ========== -->
  <g id="esa">
    <polygon points="555,618 452,515 308,515 205,618 205,762 308,865 452,865 555,762" fill="#E0F2F1" stroke="#4DB6AC" stroke-width="1.8" filter="url(#shd)"/>

