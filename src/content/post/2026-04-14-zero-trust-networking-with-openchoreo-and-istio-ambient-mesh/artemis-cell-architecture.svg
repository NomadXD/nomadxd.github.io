    <text class="comp-label" x="1030" y="577">signal-router</text>

    <circle class="comp-circle" cx="1111" cy="690" r="24" stroke="#BA68C8"/>
    <g transform="translate(1111,690)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#BA68C8"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#BA68C8"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#BA68C8"/>
    </g>
    <text class="comp-label" x="1111" y="724">goldstone</text>

    <circle class="comp-circle" cx="1030" cy="771" r="24" stroke="#BA68C8"/>
    <g transform="translate(1030,771)">
