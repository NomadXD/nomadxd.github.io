      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#BA68C8"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#BA68C8"/>
    </g>
    <text class="comp-label" x="1030" y="805">madrid</text>

    <circle class="comp-circle" cx="949" cy="690" r="24" stroke="#BA68C8"/>
    <g transform="translate(949,690)">
