<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
    <style>
      .comp-circle { fill: #FFFFFF; stroke-width: 1.2; }
      .cell-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .comp-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #888; text-anchor: middle; }
      .conn-line { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .conn-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .icon-stroke { stroke-width: 0.8; fill: none; }
      .waypoint-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #888; text-anchor: middle; }
    </style>
    <filter id="shd" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="white"/>

  <!-- ========== KENNEDY CELL ========== -->
  <g id="kennedy">
    <polygon points="370,143 267,40 123,40 20,143 20,287 123,390 267,390 370,287" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.8" filter="url(#shd)"/>

    <circle class="comp-circle" cx="195" cy="134" r="24" stroke="#66BB6A"/>
    <g transform="translate(195,134)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#66BB6A"/>
    </g>
    <text class="comp-label" x="195" y="102">launch-control</text>

    <circle class="comp-circle" cx="276" cy="215" r="24" stroke="#66BB6A"/>
    <g transform="translate(276,215)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#66BB6A"/>
    </g>
    <text class="comp-label" x="276" y="249">ground-systems</text>

    <circle class="comp-circle" cx="195" cy="296" r="24" stroke="#66BB6A"/>
    <g transform="translate(195,296)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#66BB6A"/>
    </g>
    <text class="comp-label" x="195" y="330">weather-station</text>

    <circle class="comp-circle" cx="114" cy="215" r="24" stroke="#66BB6A"/>
    <g transform="translate(114,215)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#66BB6A"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#66BB6A"/>
    </g>
    <text class="comp-label" x="114" y="249">pad-operations</text>

    <text class="cell-title" x="195" y="418" fill="#2E7D32">Kennedy</text>
  </g>

  <!-- ========== HOUSTON CELL ========== -->
  <g id="houston">
    <polygon points="875,238 772,135 628,135 525,238 525,382 628,485 772,485 875,382" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.8" filter="url(#shd)"/>

    <circle class="comp-circle" cx="700" cy="229" r="24" stroke="#64B5F6"/>
    <g transform="translate(700,229)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#64B5F6"/>
    </g>
    <text class="comp-label" x="700" y="197">flight-director</text>

    <circle class="comp-circle" cx="781" cy="310" r="24" stroke="#64B5F6"/>
    <g transform="translate(781,310)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#64B5F6"/>
    </g>
    <text class="comp-label" x="781" y="344">capcom</text>

    <circle class="comp-circle" cx="700" cy="391" r="24" stroke="#64B5F6"/>
    <g transform="translate(700,391)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#64B5F6"/>
    </g>
    <text class="comp-label" x="700" y="425">telemetry-monitor</text>

    <circle class="comp-circle" cx="619" cy="310" r="24" stroke="#64B5F6"/>
    <g transform="translate(619,310)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#64B5F6"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#64B5F6"/>
    </g>
    <text class="comp-label" x="619" y="344">flight-dynamics</text>

    <!-- Waypoint proxy on left edge -->
    <circle cx="525" cy="310" r="18" fill="#466BB0" filter="url(#shd)"/>
    <polygon points="515,310 522,305 522,315" fill="#FFFFFF"/>
    <polygon points="535,310 528,305 528,315" fill="#FFFFFF"/>
    <text class="waypoint-label" x="525" y="336">waypoint</text>

    <text class="cell-title" x="700" y="514" fill="#1565C0">Houston</text>
  </g>

  <!-- ========== ORION CELL ========== -->
