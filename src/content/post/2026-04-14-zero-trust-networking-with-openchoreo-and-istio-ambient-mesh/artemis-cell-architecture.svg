    <g transform="translate(1030,609)">
      <rect class="icon-stroke" x="-7" y="-8" width="14" height="16" rx="2" stroke="#BA68C8"/>
      <line class="icon-stroke" x1="-4" y1="-2" x2="4" y2="-2" stroke="#BA68C8"/>
      <line class="icon-stroke" x1="-4" y1="3" x2="4" y2="3" stroke="#BA68C8"/>
