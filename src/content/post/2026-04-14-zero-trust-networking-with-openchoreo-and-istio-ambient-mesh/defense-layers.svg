<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e57373"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#66BB6A"/>
    </marker>
    <style>
      .layer-box { stroke-width: 1.8; rx: 8; }
      .layer-title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; font-size: 14px; text-anchor: middle; }
      .layer-sub { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 400; font-size: 11px; text-anchor: middle; }
      .layer-detail { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 400; font-size: 10px; fill: #888; text-anchor: middle; }
      .flow-line { stroke-width: 1.8; fill: none; }
      .flow-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; text-anchor: middle; }
      .badge { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; font-weight: 600; text-anchor: middle; }
      .section-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #999; text-anchor: start; }
    </style>
  </defs>

  <rect width="900" height="480" fill="white"/>

  <!-- ===== INCOMING REQUEST ===== -->
  <rect x="50" y="30" width="160" height="50" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text class="layer-title" x="130" y="52" fill="#E65100" font-size="12">Incoming Request</text>
  <text class="layer-sub" x="130" y="67" fill="#FF9800">pod-to-pod / external</text>

  <!-- Arrow to Layer 1 -->
  <line x1="210" y1="55" x2="280" y2="55" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== LAYER 1: OPENCHOREO NETWORKPOLICY ===== -->
  <rect class="layer-box" x="290" y="15" width="200" height="80" fill="#E3F2FD" stroke="#64B5F6"/>
  <text class="section-label" x="300" y="10" fill="#64B5F6">Layer 1</text>
  <text class="layer-title" x="390" y="42" fill="#1565C0">NetworkPolicy</text>
  <text class="layer-sub" x="390" y="58" fill="#42A5F5">L3/L4 — IP + Port</text>
  <text class="layer-detail" x="390" y="80">Blocks: external namespaces, unknown pods</text>

  <!-- Arrow to Layer 2 -->
  <line x1="490" y1="55" x2="560" y2="55" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== LAYER 2: ZTUNNEL mTLS ===== -->
  <rect class="layer-box" x="570" y="15" width="200" height="80" fill="#F3E5F5" stroke="#BA68C8"/>
  <text class="section-label" x="580" y="10" fill="#BA68C8">Layer 2</text>
  <text class="layer-title" x="670" y="42" fill="#7B1FA2">ztunnel mTLS</text>
  <text class="layer-sub" x="670" y="58" fill="#AB47BC">L4 — HBONE encryption</text>
  <text class="layer-detail" x="670" y="80">Assigns SPIFFE identity to every pod</text>

  <!-- Arrow down to Layer 3 -->
  <path d="M 770,55 L 820,55 L 820,165 L 770,165" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ===== LAYER 3: WAYPOINT PROXY ===== -->
  <rect class="layer-box" x="500" y="130" width="270" height="80" fill="#E8F5E9" stroke="#66BB6A"/>
  <text class="section-label" x="510" y="125" fill="#66BB6A">Layer 3</text>
  <text class="layer-title" x="635" y="157" fill="#2E7D32">Waypoint Proxy</text>
  <text class="layer-sub" x="635" y="173" fill="#4CAF50">L7 — Identity + Method + Path</text>
  <text class="layer-detail" x="635" y="195">AuthorizationPolicy with SPIFFE principals</text>

  <!-- Arrow to Service -->
  <line x1="500" y1="170" x2="430" y2="170" stroke="#66BB6A" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- ===== SERVICE ===== -->
  <rect x="260" y="145" width="170" height="50" rx="8" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5"/>
  <text class="layer-title" x="345" y="170" fill="#555" font-size="13">Service</text>
  <text class="layer-sub" x="345" y="185" fill="#999">destination pod</text>

  <!-- ============================================ -->
  <!-- ADVERSARY SCENARIO (bottom half)             -->
  <!-- ============================================ -->

  <line x1="50" y1="240" x2="850" y2="240" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="6,4"/>
  <text class="section-label" x="50" y="265" fill="#e57373">Adversary path (rogue pod)</text>

  <!-- Adversary -->
  <rect x="50" y="280" width="160" height="50" rx="8" fill="#FFEBEE" stroke="#e57373" stroke-width="1.5"/>
  <text class="layer-title" x="130" y="302" fill="#C62828" font-size="12">Adversary</text>
  <text class="layer-sub" x="130" y="317" fill="#e57373">compromised container</text>

  <!-- Arrow: passes Layer 1 -->
  <line x1="210" y1="305" x2="280" y2="305" stroke="#66BB6A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Layer 1 (pass) -->
  <rect class="layer-box" x="290" y="265" width="200" height="80" fill="#E3F2FD" stroke="#64B5F6"/>
  <text class="layer-title" x="390" y="297" fill="#1565C0">NetworkPolicy</text>
  <text class="layer-sub" x="390" y="313" fill="#42A5F5">L3/L4</text>
  <rect x="340" y="325" width="100" height="18" rx="9" fill="#C8E6C9"/>
  <text class="badge" x="390" y="338" fill="#2E7D32">PASS (same ns)</text>

  <!-- Arrow: passes Layer 2 -->
  <line x1="490" y1="305" x2="560" y2="305" stroke="#66BB6A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Layer 2 (pass) -->
  <rect class="layer-box" x="570" y="265" width="200" height="80" fill="#F3E5F5" stroke="#BA68C8"/>
  <text class="layer-title" x="670" y="297" fill="#7B1FA2">ztunnel mTLS</text>
  <text class="layer-sub" x="670" y="313" fill="#AB47BC">L4 — encrypted</text>
  <rect x="615" y="325" width="110" height="18" rx="9" fill="#C8E6C9"/>
  <text class="badge" x="670" y="338" fill="#2E7D32">PASS (gets identity)</text>

  <!-- Arrow down to Layer 3 -->
  <path d="M 770,305 L 820,305 L 820,415 L 770,415" stroke="#66BB6A" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- Layer 3 (DENIED) -->
  <rect class="layer-box" x="500" y="380" width="270" height="80" fill="#FFEBEE" stroke="#e57373" stroke-width="2"/>
  <text class="layer-title" x="635" y="407" fill="#C62828">Waypoint Proxy</text>
  <text class="layer-sub" x="635" y="423" fill="#e57373">L7 — AuthorizationPolicy</text>
  <rect x="580" y="435" width="110" height="20" rx="10" fill="#FFCDD2"/>
  <text class="badge" x="635" y="449" fill="#C62828">403 DENIED</text>

  <!-- Blocked arrow (red X) -->
  <line x1="500" y1="420" x2="440" y2="420" stroke="#e57373" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="445" y="415" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#e57373" text-anchor="middle">&#x2717;</text>
</svg>
